<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>

<body>

    <h2>Student Registration Form</h2>

    <form action="register.php" method="POST">

        <!-- Text -->
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="fullname" placeholder="Enter your full name" required minlength="3"
            maxlength="50">

        <br><br>

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="abc@gmail.com" required>

        <br><br>

        <!-- Password -->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required minlength="8">

        <br><br>

        <!-- Number -->
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="18" max="60" required>

        <br><br>

        <!-- Date -->
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">

        <br><br>

        <!-- Time -->
        <label for="time">Preferred Time:</label>
        <input type="time" id="time" name="time">

        <br><br>

        <!-- Datetime -->
        <label for="meeting">Meeting:</label>
        <input type="datetime-local" id="meeting" name="meeting">

        <br><br>

        <!-- Month -->
        <label for="month">Admission Month:</label>
        <input type="month" id="month" name="month">

        <br><br>

        <!-- Week -->
        <label for="week">Training Week:</label>
        <input type="week" id="week" name="week">

        <br><br>

        <!-- Telephone -->
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="9876543210" required>

        <br><br>

        <!-- URL -->
        <label for="website">Portfolio:</label>
        <input type="url" id="website" name="website" placeholder="https://">

        <br><br>

        <!-- Search -->
        <label for="search">Search:</label>
        <input type="search" id="search" name="search">

        <br><br>

        <!-- Color -->
        <label for="color">Favorite Color:</label>
        <input type="color" id="color" name="color">

        <br><br>

        <!-- Range -->
        <label for="cgpa">CGPA:</label>
        <input type="range" id="cgpa" name="cgpa" min="0" max="10">

        <br><br>

        <!-- File -->
        <label for="resume">Resume:</label>
        <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx">

        <br><br>

        <!-- Radio -->
        <label>Gender:</label>
        
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label>

        <br><br>

        <!-- Checkbox -->
        <label>Skills:</label>

        <input type="checkbox" id="html" name="skills" value="HTML">
        <label for="html">HTML</label>

        <input type="checkbox" id="css" name="skills" value="CSS">
        <label for="css">CSS</label>

        <input type="checkbox" id="js" name="skills" value="JavaScript">
        <label for="js">JavaScript</label>

        <br><br>

        <!-- Dropdown -->
        <label for="department">
            Department:
        </label>

        <select id="department" name="department">
            <option value="">Select</option>
            <option>IT</option>
            <option>CE</option>
            <option>ME</option>
            <option>EC</option>
        </select>

        <br><br>

        <!-- Textarea -->

        <label for="address">
            Address:
        </label>
        <br>
        <textarea id="address" name="address" rows="5" cols="40" placeholder="Enter your address">
        </textarea>

        <br><br>

        <!-- Hidden -->
        <input type="hidden" name="studentid" value="1001">

        <!-- Buttons -->
        <input type="submit" value="Register">
        <input type="reset" value="Reset">
        <button type="button">
            Click Me
        </button>

    </form>

</body>
</html>


<!-- GET -->
<!-- - Retrieve data
- Data Visible in URL
- Less secure
- Data size is limited and small
- File upload not supported
- Common used in search and filters -->

<!-- POST -->
<!-- - Send / Create data
- Data in request body
- Data not visible in URL
- More secure
- Data size is larger
- File upload supported
- Common used in Login, Register, Uploads -->
