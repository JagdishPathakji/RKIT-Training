<!-- Semantic HTML was introduced in HTML5 to give meaning to different parts of a webpage. Instead of using generic <div> elements everywhere, semantic tags clearly describe the purpose of the content they contain. -->

<!-- Semantic tags make web pages:
- Easier to read and maintain
- Better for Search Engine Optimization (SEO)
- More accessible to users with disabilities
- Easier for browsers and search engines to understand -->

<!-- Semantic means having meaning.
A semantic tag clearly describes the purpose of the content inside it. -->

<!-- For example:
<header>
immediately tells us
"This section is the header of the webpage."

Whereas
<div>
tells us nothing about the content. -->


<!-- Semantic Tags 
These tags describe their purpose.
Examples:
<header>
<nav>
<main>
<section>
<article>
<aside>
<footer> -->

<!-- Non-Semantic Tags
These tags do not describe their purpose.
Examples:
<div>
<span> -->


<!-- SEO (Search Engine Optimization) -->
<!-- SEO is the process of improving a website so that it ranks higher in search engine results like Google, Bing and Yahoo.

Good SEO helps:
- Increase website visibility.
- Bring more visitors (organic traffic).
- Improve search rankings.
- Make content easier for search engines to understand. -->


<!DOCTYPE html>
<html>
<head>
    <title>Semantic HTML</title>
</head>

<body>
    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <main>
        <article>
            <h2>Learning HTML</h2>
            <p>HTML is the standard markup language...</p>
        </article>
    </main>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>

</html>
